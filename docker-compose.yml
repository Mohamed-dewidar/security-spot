services:
  api:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - ./server/data:/app/data
    environment:
      PORT: "3001"

  web:
    build:
      context: ./client
      args:
        VITE_USE_API: "true"
        VITE_API_URL: http://localhost:3001/api/v1
    ports:
      - "5173:80"
    depends_on:
      - api
